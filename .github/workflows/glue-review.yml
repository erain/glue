name: glue-review

# Dogfoods agents/glue-review on every PR opened against this repo by
# consuming the same composite Action external repos use. The Action
# itself lives at agents/glue-review/action.yml — see that file for the
# full input/output contract.
#
# Trigger philosophy: review once per PR on the cumulative state, not
# on every push. `synchronize` is intentionally NOT in the type list —
# pushing a new commit does not auto-trigger a fresh review. To
# re-review after iterating, a maintainer comments `/glue-review`,
# which fires the sibling glue-review-comment.yml workflow. This
# matches how human senior reviewers work (review when the PR is
# ready; refresh on request) and avoids burning provider quota on
# every intermediate push.
#
# Fork PRs do not receive secrets on `pull_request`; the workflow
# detects that and skips quietly. The `/glue-review` comment trigger
# covers the fork-PR path.

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: glue-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: review
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.body, '[skip-review]') &&
      github.event.pull_request.user.login != 'github-actions[bot]'

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          # Pin to the resolved head SHA to neutralize push-after-trigger races;
          # fetch-depth: 0 is required for `git diff origin/<base>...HEAD`.
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Gate on any provider key
        id: gate
        env:
          NVIDIA_KEY: ${{ secrets.NVIDIA_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$NVIDIA_KEY" ] || [ -n "$OPENROUTER_KEY" ] || [ -n "$GEMINI_KEY" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "No provider key set (fork PR or no secrets configured); skipping review."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip docs-only PRs
        if: steps.gate.outputs.skip == 'false'
        id: scope
        run: |
          base="origin/${{ github.event.pull_request.base.ref }}"
          changed=$(git diff --name-only "$base"...HEAD || true)
          if [ -z "$changed" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          non_docs=$(echo "$changed" | grep -vE '\.md$|^docs/' || true)
          if [ -z "$non_docs" ]; then
            echo "All changed files are docs/markdown; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run glue-review
        if: steps.gate.outputs.skip == 'false' && steps.scope.outputs.skip == 'false'
        uses: ./agents/glue-review
        with:
          # Failover order: NVIDIA Kimi K2.6 first (strongest free model);
          # OpenRouter Ling next (deterministic free); Gemini last as a
          # paid-tier fallback. Each provider is tried only when its key
          # is set in the env, so missing keys are silent skips.
          provider: nvidia,openrouter,gemini
          base-ref: ${{ github.event.pull_request.base.ref }}
          max-turns: '12'
          nvidia-api-key: ${{ secrets.NVIDIA_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
