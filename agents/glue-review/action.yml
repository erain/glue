name: glue-review
description: |
  Free, local pre-PR branch reviewer. Reads the diff against a base ref,
  deep-reads files when context demands it, and posts (or updates) a
  sticky review comment via GitHub's Issues API.
author: erain

# Branding for Marketplace listings (effective once published).
branding:
  icon: 'check-circle'
  color: 'purple'

inputs:
  provider:
    description: |
      Provider name, or comma-separated failover chain
      (e.g. `openrouter,nvidia,gemini`). Each provider is tried in
      order; the first whose API key is set in env AND whose call
      succeeds wins.
    required: false
    default: openrouter
  model:
    description: |
      Model id. When empty, uses the provider-specific default
      (OpenRouter: inclusionai/ring-2.6-1t:free, NVIDIA:
      moonshotai/kimi-k2.6, Gemini: gemini-2.5-flash).
    required: false
    default: ''
  base-ref:
    description: |
      Ref to diff against. Default is the PR's base branch
      (`github.base_ref`). Override for non-PR contexts.
    required: false
    default: ${{ github.base_ref }}
  max-turns:
    description: Loop budget (cap on assistant turns).
    required: false
    default: '12'
  github-token:
    description: |
      Token used to post the sticky comment. Default is the workflow's
      automatic GITHUB_TOKEN; override with a PAT if you need cross-repo
      commenting.
    required: false
    default: ${{ github.token }}
  nvidia-api-key:
    description: NVIDIA build API key (used when provider=nvidia).
    required: false
    default: ''
  openrouter-api-key:
    description: OpenRouter API key (used when provider=openrouter).
    required: false
    default: ''
  gemini-api-key:
    description: Gemini API key (used when provider=gemini).
    required: false
    default: ''
  go-version:
    description: Go toolchain version for `setup-go`.
    required: false
    default: stable
  paths:
    description: |
      Comma-separated Git pathspec globs. Only files matching at least
      one pattern are reviewed. When empty, all changed files are in
      scope. Example: `src/**,*.go`.
    required: false
    default: ''
  paths-ignore:
    description: |
      Comma-separated Git pathspec globs to exclude from review;
      applied after `paths`. Example: `vendor/**,*.gen.go,testdata/**`.
    required: false
    default: ''
  prompt:
    description: |
      User prompt to send to the agent. Overrides the built-in
      "review the current branch" prompt — useful for one-off focused
      reviews ("only check for SQL injection", etc.).
    required: false
    default: ''
  extra-blocked-paths:
    description: |
      Comma-separated path patterns the read_file tool will refuse to
      open, in addition to the built-in defaults (`.env`, `id_rsa*`,
      `*.pem`, `credentials.json`, etc.). Use to extend the blocklist
      with repo-specific secret-shaped files. Cannot subtract defaults.
    required: false
    default: ''
  pr-number:
    description: |
      PR number to comment on. Defaults to
      `github.event.pull_request.number` so the action just works in
      `pull_request` workflows; override when triggering from
      `issue_comment` or `workflow_dispatch`.
    required: false
    default: ${{ github.event.pull_request.number }}

outputs:
  review-markdown-path:
    description: |
      Path on the runner filesystem where the raw review markdown was
      written; useful for follow-up steps that want to post-process the
      review (extract sections, lint structure, etc.).
    value: ${{ steps.run.outputs.review-path }}
  comment-url:
    description: API URL of the sticky comment that was created or updated.
    value: ${{ steps.post.outputs.comment-url }}
  exit-code:
    description: |
      Exit code from the agent invocation. Non-zero indicates the
      sticky comment carries a soft-fail message rather than a real
      review.
    value: ${{ steps.run.outputs.exit-code }}

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}
        cache: true

    - name: Install glue-review
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
      run: |
        # Build from the Action's own source tree. For `uses:` references
        # GitHub fetches the requested ref into ${{ github.action_path }},
        # so the binary matches the consumer's pinned action ref exactly.
        # No separate go install — that would fetch a possibly-different
        # version of the same source from the module cache.
        cd "$ACTION_PATH"
        go build -o "${RUNNER_TEMP}/glue-review" .
        echo "GLUE_REVIEW_BIN=${RUNNER_TEMP}/glue-review" >> "$GITHUB_ENV"

    - name: Run glue-review
      id: run
      shell: bash
      env:
        NVIDIA_API_KEY: ${{ inputs.nvidia-api-key }}
        OPENROUTER_API_KEY: ${{ inputs.openrouter-api-key }}
        GEMINI_API_KEY: ${{ inputs.gemini-api-key }}
      run: |
        set +e
        review_path="${RUNNER_TEMP}/glue-review.md"
        err_path="${RUNNER_TEMP}/glue-review.err"
        bin="$GLUE_REVIEW_BIN"

        args=(
          --provider "${{ inputs.provider }}"
          --base "origin/${{ inputs.base-ref }}"
          --max-turns "${{ inputs.max-turns }}"
          --id "pr-${{ inputs.pr-number }}"
          --store ".glue/action-sessions"
        )
        if [ -n "${{ inputs.model }}" ]; then
          args+=(--model "${{ inputs.model }}")
        fi
        if [ -n "${{ inputs.extra-blocked-paths }}" ]; then
          args+=(--blocked-paths "${{ inputs.extra-blocked-paths }}")
        fi
        if [ -n "${{ inputs.paths }}" ]; then
          args+=(--paths "${{ inputs.paths }}")
        fi
        if [ -n "${{ inputs.paths-ignore }}" ]; then
          args+=(--paths-ignore "${{ inputs.paths-ignore }}")
        fi
        if [ -n "${{ inputs.prompt }}" ]; then
          args+=(--prompt "${{ inputs.prompt }}")
        fi

        "$bin" "${args[@]}" > "$review_path" 2> "$err_path"
        rc=$?

        echo "review-path=$review_path" >> "$GITHUB_OUTPUT"
        echo "err-path=$err_path"       >> "$GITHUB_OUTPUT"
        echo "exit-code=$rc"            >> "$GITHUB_OUTPUT"
        echo "review bytes: $(wc -c < "$review_path")"
        echo "----stderr (last 4k)----"
        tail -c 4096 "$err_path" || true

    - name: Post or update sticky comment
      id: post
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REVIEW_PATH: ${{ steps.run.outputs.review-path }}
        ERR_PATH: ${{ steps.run.outputs.err-path }}
        EXIT_CODE: ${{ steps.run.outputs.exit-code }}
        PR_NUMBER: ${{ inputs.pr-number }}
        REPO: ${{ github.repository }}
      run: |
        # Marker is hidden in the comment HTML so we can find this bot's
        # comment on re-runs. Bump it when the comment shape changes in
        # a way that would mangle an in-place edit.
        MARKER='<!-- glue-review:do-not-edit -->'
        FOOTER=$'\n---\n*🤖 Posted by [glue-review](https://github.com/erain/glue/tree/main/agents/glue-review).*'

        # Build the comment body in a temp file so we never have to embed
        # heredocs inside this YAML block (block-scalar indentation makes
        # heredocs awkward). gh api -F body=@file reads the file as-is.
        BODY_PATH="${RUNNER_TEMP}/glue-review-body.md"

        # Soft-fail marker so we can recognise a previous failure body
        # and overwrite it (but never overwrite a real review).
        SOFT_FAIL_MARK='<!-- glue-review:soft-fail -->'

        SUCCESS=0
        if [ "$EXIT_CODE" = "0" ] && [ -s "$REVIEW_PATH" ]; then
          SUCCESS=1
          {
            printf '%s\n' "$MARKER"
            cat "$REVIEW_PATH"
            printf '%s' "$FOOTER"
          } > "$BODY_PATH"
        else
          {
            printf '%s\n' "$MARKER"
            printf '%s\n' "$SOFT_FAIL_MARK"
            printf '%s\n\n' '⚠️ **glue-review could not produce a review.**'
            printf 'Exit code: `%s`. Re-run the workflow to retry.\n\n' "$EXIT_CODE"
            printf '<details><summary>Failure log (last 3.5 KiB of stderr)</summary>\n\n'
            printf '```\n'
            tail -c 3500 "$ERR_PATH" 2>/dev/null || echo '(no stderr captured)'
            printf '\n```\n\n</details>'
            printf '%s' "$FOOTER"
          } > "$BODY_PATH"
        fi

        existing_id=$(
          gh api --paginate \
            "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq "[.[] | select(.body | contains(\"$MARKER\"))] | first | .id"
        )
        existing_is_soft_fail=0
        if [ -n "$existing_id" ] && [ "$existing_id" != "null" ]; then
          existing_body=$(gh api "repos/$REPO/issues/comments/$existing_id" --jq '.body')
          if printf '%s' "$existing_body" | grep -qF "$SOFT_FAIL_MARK"; then
            existing_is_soft_fail=1
          fi
        fi

        # Behaviour matrix:
        #   success + no existing                       -> create new sticky
        #   success + existing (any flavor)             -> overwrite in-place
        #   fail    + no existing                       -> create soft-fail sticky
        #   fail    + existing review (not soft-fail)   -> SKIP: keep the prior good review
        #   fail    + existing soft-fail sticky         -> overwrite (refresh the error)
        if [ "$SUCCESS" = "1" ]; then
          if [ -n "$existing_id" ] && [ "$existing_id" != "null" ]; then
            url=$(gh api -X PATCH "repos/$REPO/issues/comments/$existing_id" \
              -F body="@$BODY_PATH" --jq '.url')
            echo "Updated comment $existing_id (success)"
          else
            url=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
              -F body="@$BODY_PATH" --jq '.url')
            echo "Created new sticky comment"
          fi
          echo "comment-url=$url" >> "$GITHUB_OUTPUT"
        else
          if [ -n "$existing_id" ] && [ "$existing_id" != "null" ] && [ "$existing_is_soft_fail" = "0" ]; then
            echo "::warning::glue-review run failed (exit $EXIT_CODE); previous successful review on comment $existing_id is kept intact."
            echo "comment-url=" >> "$GITHUB_OUTPUT"
          elif [ -n "$existing_id" ] && [ "$existing_id" != "null" ]; then
            url=$(gh api -X PATCH "repos/$REPO/issues/comments/$existing_id" \
              -F body="@$BODY_PATH" --jq '.url')
            echo "Updated soft-fail comment $existing_id (still failing)"
            echo "comment-url=$url" >> "$GITHUB_OUTPUT"
          else
            url=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
              -F body="@$BODY_PATH" --jq '.url')
            echo "Created soft-fail sticky comment"
            echo "comment-url=$url" >> "$GITHUB_OUTPUT"
          fi
        fi
